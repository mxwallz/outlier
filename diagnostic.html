<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>moneyprinter.ai | Diagnostic</title>
<!-- IMPLEMENTED from claude.ai design "Moneyprinter Diagnostic.dc.html" (project: AI Money Printer Rebrand).
     Supersedes the prior hand-built diagnostic. Build flags: OPPORTUNITY VALUE is a disclaimed estimate; wire CLAIM button to the real booking step. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Space+Mono:wght@400;700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  @keyframes mp-bob{from{transform:translateY(0)}to{transform:translateY(-4px)}}
  @keyframes mp-blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.12)}}
  @keyframes mp-scan{from{background-position-y:0}to{background-position-y:6px}}
  @keyframes mp-print{0%{transform:translateY(8px) scale(.6);opacity:0}20%{opacity:1}74%{opacity:1}100%{transform:translateY(-50px) rotate(-7deg) scale(1);opacity:0}}
  input[type=range]{accent-color:#0c8f66;}
  input::placeholder{color:#9a8e74;}
  input:focus{border-color:#0c8f66 !important;}
  .optbtn{display:flex;align-items:center;gap:16px;width:100%;text-align:left;border:2px solid #241f1a;background:#efe9da;box-shadow:5px 5px 0 rgba(36,31,26,.16);padding:17px 20px;cursor:pointer;font:500 17px 'Hanken Grotesk',sans-serif;color:#241f1a;}
  .optbtn:hover{transform:translate(2px,2px);box-shadow:3px 3px 0 rgba(36,31,26,.16);background:#f3eede;}
  .optbtn.sel{background:#dff0e6;}
  .optbtn .box{flex:none;width:22px;height:22px;border:2px solid #241f1a;background:transparent;display:flex;align-items:center;justify-content:center;font:700 13px 'Space Mono',monospace;color:#f4efe0;}
  .optbtn.sel .box{background:#0c8f66;}
  .gbtn{background:#0c8f66;color:#f4efe0;border:2px solid #0a7355;box-shadow:6px 6px 0 #1d5e47;font:700 16px 'Space Mono',monospace;letter-spacing:2px;cursor:pointer;transition:.1s;}
  .gbtn:hover{transform:translate(2px,2px);box-shadow:4px 4px 0 #1d5e47;}
  .sobtn{background:transparent;color:#5e2d2d;border:2px solid #5e2d2d;font:700 13px 'Space Mono',monospace;letter-spacing:1px;padding:19px 22px;cursor:pointer;transition:.1s;}
  .sobtn:hover{background:#5e2d2d;color:#f0ead9;}
  @media(max-width:640px){h1{font-size:32px !important;}}
  /* needle slider you click across ticks */
  .needle{-webkit-appearance:none;appearance:none;width:100%;height:30px;background:transparent;cursor:grab;}
  .needle:active{cursor:grabbing;}
  .needle::-webkit-slider-runnable-track{height:3px;background:#241f1a;}
  .needle::-moz-range-track{height:3px;background:#241f1a;}
  .needle::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:28px;background:#0c8f66;border:2px solid #241f1a;margin-top:-13px;box-shadow:2px 2px 0 rgba(36,31,26,.3);}
  .needle::-moz-range-thumb{width:8px;height:28px;border-radius:0;background:#0c8f66;border:2px solid #241f1a;box-shadow:2px 2px 0 rgba(36,31,26,.3);}
</style>
</head>
<body>
<div style="min-height:100vh;display:flex;flex-direction:column;background-color:#e9e3d3;background-image:repeating-linear-gradient(45deg,rgba(36,31,26,.04) 0 1px,transparent 1px 9px),repeating-linear-gradient(-45deg,rgba(36,31,26,.03) 0 1px,transparent 1px 9px);font-family:'Hanken Grotesk',system-ui,sans-serif;position:relative;overflow:hidden;">

  <div style="position:absolute;left:0;right:0;bottom:0;height:42%;background-image:radial-gradient(rgba(36,31,26,.13) 1px,transparent 1.4px);background-size:12px 12px;-webkit-mask-image:linear-gradient(transparent,#000);mask-image:linear-gradient(transparent,#000);pointer-events:none;z-index:0;"></div>

  <!-- top bar -->
  <div style="position:relative;z-index:3;display:flex;align-items:center;justify-content:center;height:62px;padding:0 56px;border-bottom:2px solid #241f1a;">
    <div style="display:flex;align-items:flex-start;gap:5px;">
      <span style="font:800 22px 'Hanken Grotesk',sans-serif;letter-spacing:-.8px;color:#241f1a;">money<span style="color:#0c8f66;">printer</span><span style="color:#06B6D4;">.ai</span></span>
      <span style="color:#06B6D4;font-size:13px;line-height:1;margin-top:2px;">&#10022;</span>
    </div>
  </div>

  <!-- progress strip -->
  <div style="position:relative;z-index:3;display:flex;align-items:center;gap:20px;padding:13px 56px;border-bottom:2px solid #241f1a;background:rgba(239,233,218,.5);">
    <span id="phaseLabel" style="font:700 11px 'Space Mono',monospace;letter-spacing:2px;color:#5e2d2d;white-space:nowrap;">FINDING YOUR CURRENT STATE</span>
    <div id="cells" style="flex:1;display:flex;gap:3px;"></div>
    <span id="percent" style="font:700 12px 'Space Mono',monospace;letter-spacing:1px;color:#0c8f66;width:42px;text-align:right;">0%</span>
  </div>

  <!-- main -->
  <div style="position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 56px 64px;">
    <div id="main" style="width:100%;max-width:780px;"></div>
  </div>

  <!-- persistent printer-head robot -->
  <div style="position:absolute;bottom:30px;right:46px;z-index:6;width:84px;animation:mp-bob 1.9s steps(2) infinite alternate;">
    <div id="robotBills" style="position:absolute;left:50%;margin-left:-15px;top:2px;width:30px;height:8px;z-index:1;display:none;">
      <div style="position:absolute;width:30px;height:17px;background:linear-gradient(#1faa73,#0c8f66);border:1px solid #c79a3e;display:flex;align-items:center;justify-content:center;font:700 8px 'Space Mono',monospace;color:#bfe9d6;animation:mp-print 1.9s steps(8) infinite;">$</div>
      <div style="position:absolute;width:30px;height:17px;background:linear-gradient(#1faa73,#0c8f66);border:1px solid #c79a3e;display:flex;align-items:center;justify-content:center;font:700 8px 'Space Mono',monospace;color:#bfe9d6;animation:mp-print 1.9s steps(8) infinite;animation-delay:.95s;">$</div>
    </div>
    <div style="position:relative;z-index:4;width:54px;height:8px;margin:0 auto;background:#241f1a;border:2px solid #241f1a;border-radius:3px 3px 0 0;"></div>
    <div style="width:78px;height:60px;margin:-1px auto 0;background:#5e2d2d;border:2px solid #241f1a;border-radius:4px 4px 11px 11px;box-shadow:4px 4px 0 rgba(36,31,26,.18);padding:7px;position:relative;z-index:3;">
      <div style="position:relative;width:100%;height:100%;background:#10201c;border:2px solid #241f1a;border-radius:3px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;">
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(6,182,212,.16) 0 1px,transparent 1px 3px);animation:mp-scan 1.2s steps(4) infinite;pointer-events:none;"></div>
        <div style="display:flex;gap:10px;align-items:center;">
          <span id="robotIdle" style="display:flex;gap:10px;align-items:center;">
            <span style="width:11px;height:15px;background:#06B6D4;border-radius:50%;box-shadow:0 0 8px rgba(6,182,212,.6);animation:mp-blink 3.4s infinite;"></span>
            <span style="width:11px;height:15px;background:#06B6D4;border-radius:50%;box-shadow:0 0 8px rgba(6,182,212,.6);animation:mp-blink 3.4s infinite;"></span>
          </span>
          <span id="robotMoney" style="display:none;gap:10px;align-items:center;">
            <span style="font:700 14px 'Space Mono',monospace;color:#10B981;text-shadow:0 0 8px rgba(16,185,129,.7);">$</span>
            <span style="font:700 14px 'Space Mono',monospace;color:#10B981;text-shadow:0 0 8px rgba(16,185,129,.7);">$</span>
          </span>
        </div>
        <div style="width:15px;height:7px;border:2px solid #06B6D4;border-top:none;border-radius:0 0 20px 20px;"></div>
      </div>
    </div>
  </div>
</div>

<script>
  let step=0, selected=null, answers={}, wand=50000;
  let workAnim=null, workTimer=null, workStart=0;
  const fmt=n=>'$'+Math.round(n).toLocaleString('en-US');
  const quant=(v,s)=>Math.floor(v/s)*s;
  function target(){ return Math.max(24000, Math.round(wand*0.82/500)*500); }

  function qDefs(){ return [
    { id:'state', kicker:'QUESTION 02 / 05', q:'Which sounds most like you right now?', help:'This tells the agent what kind of plan to build.',
      opts:['I have something working, but it should make way more',"I'm good at what I do, but I have no growth system","I know there's money here, I just don't know the next move","I'm doing everything by hand and I'm maxed out","I'm starting from zero and want the fastest path"] },
    { id:'sell', kicker:'QUESTION 03 / 05', q:'What do you sell?', help:'The agent pulls the playbooks that fit your model.',
      opts:['Coaching, courses, or info','Physical products / ecommerce','Done-for-you services or agency','Software or SaaS','Local or in-person business','Something else'] },
    { id:'revenue', kicker:'QUESTION 04 / 05', q:'What does it make per month right now?', help:'Round numbers are fine. This calibrates the estimate.',
      opts:['Under $1k','$1k to $5k','$5k to $20k','$20k to $50k','$50k+'] },
    { id:'leak', kicker:'QUESTION 05 / 05', q:'Where does it leak the most?', help:'The agent attacks this first.',
      opts:['Not enough leads','The offer is not converting','Buyers do not come back','Too much manual work','Honestly, not sure'] }
  ]; }

  const pool=[
    {t:'reading your inputs',k:'think'},{t:'mapping your funnel',k:'think'},
    {t:'patch step-3 drop-off',k:'act'},{t:'write win-back email',k:'act'},
    {t:'thinking',k:'think'},{t:'split-test subject line',k:'act'},
    {t:'add order-bump offer',k:'act'},{t:'cross-referencing playbooks',k:'think'},
    {t:'restack pricing tiers',k:'act'},{t:'trigger cart recovery',k:'act'},
    {t:'reasoning about pricing',k:'think'},{t:'segment cold leads',k:'act'},
    {t:'schedule follow-ups',k:'act'},{t:'planning next move',k:'think'},
    {t:'draft referral offer',k:'act'},{t:'tune ad audience',k:'act'},
    {t:'cut wasted ad spend',k:'act'},{t:'modeling 90-day impact',k:'think'},
    {t:'rewrite landing hero',k:'act'},{t:'add urgency timer',k:'act'},
    {t:'reviewing your numbers',k:'think'},{t:'bundle top SKUs',k:'act'},
    {t:'upsell at checkout',k:'act'},{t:'reactivate dormant users',k:'act'},
    {t:'prioritizing quick wins',k:'think'},{t:'automate onboarding',k:'act'},
    {t:'score inbound leads',k:'act'},{t:'route hot leads',k:'act'}
  ];
  const len=pool.length, prefixActs=[0];
  for(let j=0;j<len;j++) prefixActs.push(prefixActs[j]+(pool[j].k==='act'?1:0));
  const A=prefixActs[len];
  const actsUpTo=stp=>{ if(stp<=0) return 0; const f=Math.floor(stp/len); return f*A+prefixActs[stp-f*len]; };

  function pick(i){ const def=qDefs()[step-1]; selected=i; answers[def.id]=i; render(); setTimeout(()=>{ selected=null; goto(step+1); },240); }
  function next(){ goto(step+1); }
  function goto(s){ step=s; selected=null; render(); if(s===6) startWorking(); }
  function restart(){ stopWorking(); step=0; selected=null; answers={}; wand=50000; render(); }
  // non-linear "heavy" scale: the higher you push, the more you have to drag (friction as you raise)
  // discrete ticks you click through, $5k to $500k (denser at the top = friction as you raise)
  const TICKS=[5000,10000,25000,50000,75000,100000,150000,200000,250000,300000,350000,400000,450000,500000];
  function idxFor(money){ let best=0,bd=1e12; for(let i=0;i<TICKS.length;i++){const d=Math.abs(TICKS[i]-money); if(d<bd){bd=d;best=i;}} return best; }
  function setWand(idx){ wand=TICKS[Math.max(0,Math.min(TICKS.length-1,Math.round(+idx)))]; const el=document.getElementById('wandText'); if(el) el.textContent=fmt(wand); }
  function claim(){
    const rev=answers.revenue; // 0=Under $1k,1=$1k-5k,2=$5k-20k,3=$20k-50k,4=$50k+
    if(rev!==undefined && rev>=2){ location.href='moneyprinter-90day-roadmap.html'; }   // qualified -> full 90-day plan, then the call
    else { alert('Your plan is on its way to your inbox.\n\n(Below the revenue gate -> routed to the community / waitlist, not a 1:1 strategy call.)'); }
  }

  function startWorking(){
    workStart=performance.now(); const tgt=target();
    updateWorking(tgt);
    workAnim=setInterval(()=>updateWorking(tgt),90);
    workTimer=setTimeout(()=>{ stopWorking(); goto(7); },5200);
  }
  function stopWorking(){ if(workAnim){clearInterval(workAnim);workAnim=null;} if(workTimer){clearTimeout(workTimer);workTimer=null;} }
  function updateWorking(tgt){
    const prog=Math.min(1,(performance.now()-workStart)/5200);
    const cs=60, idx=Math.min(cs,Math.floor(prog*cs));
    const gc=['#d6f0e2','#a9d4c3','#88baa8','#71a795','#5e9180','#527f6e','#496e60'];
    const tc=['#cfe9f1','#a9cdd8','#8db4c1','#769fad','#638b99','#557a87','#4a6b78'];
    const FEED=7, feed=[];
    for(let i=FEED-1;i>=0;i--){ const li=idx-i; if(li<1) continue; const it=pool[(li-1)%len], act=it.k==='act';
      feed.push({ no:act?String(actsUpTo(li)).padStart(4,'0'):'    ', prefix:act?'▸':'↳', text:it.t, status:act?'ok':'···', statusCol:act?'#19c98a':'#6fa6b8', col:(act?gc:tc)[Math.min(i,6)] }); }
    const f=document.getElementById('wkFeed'); if(f) f.innerHTML=feed.map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;font:12.5px 'Space Mono',monospace;line-height:2.08;white-space:nowrap;color:${r.col};"><span><span style="color:#4f7a6c;">${r.no}</span>&nbsp;${r.prefix} ${r.text}</span><span style="color:${r.statusCol};">${r.status}</span></div>`).join('');
    const m=document.getElementById('wkMoney'); if(m) m.textContent=fmt(quant(Math.pow(prog,0.8)*tgt,100));
    const a=document.getElementById('wkAct'); if(a) a.textContent=String(actsUpTo(idx)).padStart(4,'0');
  }

  function qHTML(){ const def=qDefs()[step-1];
    return `<div>
      <div style="font:700 12px 'Space Mono',monospace;letter-spacing:2.5px;color:#c0512a;">${def.kicker}</div>
      <h1 style="margin:14px 0 0;font-family:'Libre Caslon Display',Georgia,serif;font-weight:400;font-size:44px;line-height:1.08;letter-spacing:-1px;color:#241f1a;">${def.q}</h1>
      <p style="margin:12px 0 0;font-size:16px;color:#6a5f4e;">${def.help}</p>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:30px;">`+
      def.opts.map((text,i)=>`<button class="optbtn${selected===i?' sel':''}" onclick="pick(${i})"><span class="box">${selected===i?'&#10003;':''}</span><span>${text}</span></button>`).join('')+
      `</div></div>`;
  }
  function wandHTML(){
    return `<div style="text-align:center;">
      <div style="font:700 12px 'Space Mono',monospace;letter-spacing:2.5px;color:#c0512a;">QUESTION 01 / 05 &middot; THE ONLY ONE THAT MATTERS</div>
      <h1 style="margin:14px 0 0;font-family:'Libre Caslon Display',Georgia,serif;font-weight:400;font-size:50px;line-height:1.04;letter-spacing:-1.4px;color:#241f1a;">What's your number?</h1>
      <p style="margin:12px 0 0;font-size:17px;color:#6a5f4e;">How much do you want to be making in the next 90 days? Be greedy. The agent builds toward it.</p>
      <div id="wandText" style="font:700 50px 'Space Mono',monospace;letter-spacing:-2px;color:#0c8f66;line-height:1;margin-top:30px;">${fmt(wand)}</div>
      <div style="max-width:580px;margin:26px auto 0;">
        <input type="range" min="0" max="${TICKS.length-1}" step="1" value="${idxFor(wand)}" oninput="setWand(this.value)" class="needle" style="width:100%;display:block;">
        <div style="position:relative;height:13px;margin-top:1px;">`+TICKS.map((v,i)=>`<div style="position:absolute;left:${(i/(TICKS.length-1)*100).toFixed(2)}%;transform:translateX(-50%);width:2px;height:${i%2?9:13}px;background:#241f1a;"></div>`).join('')+`</div>
        <div style="display:flex;justify-content:space-between;margin-top:5px;font:11px 'Space Mono',monospace;color:#9a8e74;"><span>$5k</span><span>$500k</span></div>
      </div>
      <div><button class="gbtn" onclick="next()" style="margin-top:34px;padding:18px 38px;">LOCK IT IN &nbsp;&rarr;</button></div>
    </div>`;
  }
  function contactHTML(){
    return `<div style="max-width:560px;margin:0 auto;">
      <div style="font:700 12px 'Space Mono',monospace;letter-spacing:2.5px;color:#c0512a;">LAST STEP</div>
      <h1 style="margin:14px 0 0;font-family:'Libre Caslon Display',Georgia,serif;font-weight:400;font-size:42px;line-height:1.08;letter-spacing:-1px;color:#241f1a;">Where should the agent<br>send your plan?</h1>
      <p style="margin:12px 0 0;font-size:16px;color:#6a5f4e;">Your 90-day plan and your number, free to keep.</p>
      <div style="margin-top:26px;">
        <div style="font:700 11px 'Space Mono',monospace;letter-spacing:1.5px;color:#5e2d2d;">FIRST NAME</div>
        <input type="text" placeholder="Your first name" style="width:100%;margin-top:7px;border:2px solid #241f1a;background:#efe9da;padding:15px 16px;font:16px 'Hanken Grotesk',sans-serif;color:#241f1a;outline:none;">
      </div>
      <div style="margin-top:18px;">
        <div style="font:700 11px 'Space Mono',monospace;letter-spacing:1.5px;color:#5e2d2d;">EMAIL</div>
        <input type="email" placeholder="you@email.com" style="width:100%;margin-top:7px;border:2px solid #241f1a;background:#efe9da;padding:15px 16px;font:16px 'Hanken Grotesk',sans-serif;color:#241f1a;outline:none;">
      </div>
      <button class="gbtn" onclick="next()" style="margin-top:26px;width:100%;padding:18px 38px;">BUILD MY PLAN &nbsp;&rarr;</button>
      <div style="margin-top:14px;text-align:center;font:11px 'Space Mono',monospace;color:#9a8e74;">No card &middot; No spam &middot; Your plan is yours to keep</div>
    </div>`;
  }
  function workingHTML(){
    return `<div style="border:2px solid #241f1a;background:#5e2d2d;box-shadow:9px 9px 0 #241f1a;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 16px;">
        <span style="font:700 12px 'Space Mono',monospace;letter-spacing:1.5px;color:#e9e3d3;">&#9679; AI AGENT &middot; BUILDING YOUR PLAN</span>
        <span style="display:flex;align-items:center;gap:9px;"><span style="font:11px 'Space Mono',monospace;color:#cbb896;">ACTIONS</span><span id="wkAct" style="font:700 14px 'Space Mono',monospace;color:#E5B567;background:#241f1a;padding:3px 8px;letter-spacing:2px;">0000</span></span>
      </div>
      <div style="position:relative;margin:0 6px 6px;background:#0c1512;border:2px solid #241f1a;overflow:hidden;padding:18px 22px 20px;">
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(6,182,212,.06) 0 1px,transparent 1px 3px);pointer-events:none;"></div>
        <div style="position:relative;">
          <div id="wkFeed" style="height:182px;display:flex;flex-direction:column;justify-content:flex-end;"></div>
          <div style="margin-top:8px;padding-top:15px;border-top:2px solid rgba(25,201,138,.3);">
            <div style="font:10px 'Space Mono',monospace;letter-spacing:2px;color:#6f9d8d;">OPPORTUNITY VALUE &middot; 90 DAYS</div>
            <div id="wkMoney" style="font:700 40px 'Space Mono',monospace;letter-spacing:-1px;color:#19c98a;line-height:1.05;">$0</div>
          </div>
        </div>
      </div>
    </div>`;
  }
  function resultHTML(){
    const tgt=target();
    const names=['Offer restack','Win-back sequence','Cart recovery','Lead engine','Referral loop'];
    const w=[0.28,0.23,0.19,0.17,0.13]; let acc=0;
    const plays=names.map((name,i)=>{ let v=i===names.length-1?tgt-acc:quant(tgt*w[i],100); acc+=v; return {no:String(i+1).padStart(2,'0'),name,val:fmt(v)}; });
    return `<div>
      <div style="text-align:center;">
        <div style="font:700 12px 'Space Mono',monospace;letter-spacing:2.5px;color:#c0512a;">YOUR PLAN IS READY</div>
        <div style="font:11px 'Space Mono',monospace;letter-spacing:2px;color:#8a7e64;margin-top:20px;">OPPORTUNITY VALUE &middot; NEXT 90 DAYS</div>
        <div style="font:700 54px 'Space Mono',monospace;letter-spacing:-2px;color:#0c8f66;line-height:1;margin-top:6px;">${fmt(tgt)}</div>
        <div style="font:11px 'Space Mono',monospace;color:#9a8e74;margin-top:8px;">Modeled from your inputs. An estimate of opportunity, not a guarantee of results.</div>
      </div>
      <div style="margin-top:30px;border:2px solid #241f1a;background:#efe9da;box-shadow:7px 7px 0 #5e2d2d;">
        <div style="background:#241f1a;padding:10px 18px;font:700 11px 'Space Mono',monospace;letter-spacing:2px;color:#E5B567;">YOUR 90-DAY MONEY PLAN &middot; 5 MOVES THE AGENT WILL RUN</div>
        <div style="padding:6px 18px 10px;">`+
        plays.map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid rgba(36,31,26,.14);"><span style="display:flex;align-items:center;gap:13px;"><span style="font:700 12px 'Space Mono',monospace;color:#0c8f66;">${p.no}</span><span style="font:500 17px 'Hanken Grotesk',sans-serif;color:#241f1a;">${p.name}</span></span><span style="font:700 16px 'Space Mono',monospace;color:#5e2d2d;">+${p.val}</span></div>`).join('')+
        `</div>
      </div>
      <div style="margin-top:26px;display:flex;align-items:center;gap:18px;">
        <button class="gbtn" onclick="claim()" style="flex:1;padding:19px 28px;letter-spacing:1.5px;">CLAIM MY 90-DAY PLAN &nbsp;&rarr;</button>
        <button class="sobtn" onclick="restart()">START OVER</button>
      </div>
      <div style="margin-top:14px;text-align:center;font:11px 'Space Mono',monospace;color:#9a8e74;">Free 20-minute build call &middot; No card &middot; The plan is yours to keep</div>
    </div>`;
  }

  function render(){
    const view= step===0?'wand':(step>=1&&step<=4)?'q':step===5?'contact':step===6?'working':'result';
    const frac=Math.min(1,step/6), NC=22;
    const filled=(view==='working'||view==='result')?NC:Math.round(frac*NC);
    document.getElementById('cells').innerHTML=Array.from({length:NC},(_,i)=>`<div style="flex:1;height:13px;border:1.5px solid #241f1a;background:${i<filled?'#0c8f66':'transparent'};"></div>`).join('');
    const phases=['SETTING YOUR TARGET','FINDING YOUR CURRENT STATE','FINDING YOUR CURRENT STATE','CALIBRATING YOUR NUMBERS','CALIBRATING YOUR NUMBERS','ALMOST READY'];
    document.getElementById('phaseLabel').textContent = view==='working'?'BUILDING YOUR PLAN':view==='result'?'YOUR PLAN IS READY':phases[step];
    document.getElementById('percent').textContent = (view==='working'||view==='result')?'100%':Math.round(frac*100)+'%';
    const main=document.getElementById('main');
    main.innerHTML = view==='q'?qHTML(): view==='wand'?wandHTML(): view==='contact'?contactHTML(): view==='working'?workingHTML(): resultHTML();
    const isResult=view==='result';
    document.getElementById('robotIdle').style.display=isResult?'none':'flex';
    document.getElementById('robotMoney').style.display=isResult?'flex':'none';
    document.getElementById('robotBills').style.display=isResult?'block':'none';
  }
  render();
</script>
</body>
</html>
